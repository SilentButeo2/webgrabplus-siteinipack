site {url=tcm.com|timezone=US/Eastern|maxdays=7|cultureinfo=en-US|charset=UTF-8|titlematchfactor=90}
*site {episodesystem=xmltv_ns}
*
urldate.format {datestring|yyyy-MM-dd}
*
global_temp_1.modify {calculate(format=date,yyyy-MM-dd)|'urldate' 01:00:00 +} 
url_index.modify {replace|##end##|'global_temp_1'}
url_index{url|https://wme-gep-graphql-prod.wme-digital.com/graphql?operationName=getTodayScheduleDetails&variables={"filters":{"brand":["tcm"],"title":null,"feed":["tcm"],"scheduleRange":{"startDate":"|urldate|T00:00:00.000Z","endDate":"##end##T00:00:00.000Z"}}}&extensions={"persistedQuery":{"version":1,"sha256Hash":"078ff5f76a2439680952ae5ea3edbb64eb7f2f8a19fd12793fa3012d7fa80734"}}}
*
index_showsplit.modify {replace|\},\{\"feed|\}\|\{\"feed}
index_showsplit.scrub {multi()|{"data":{"details":[||]}}|]}}}
index_showsplit.modify {cleanup(style=unidecode)}
index_showsplit.modify {cleanup(style=jsondecode)}
*index_showsplit.modify {(debug)}
**********
index_start.scrub {single|"scheduledTimestamp":"||Z|.000Z}
index_title.scrub {single|"__typename":"Title","full":"||"|"}
index_category.scrub{single(separator="","" max=3)|"genres":["||"]|"]}
index_description.scrub {single|"summary":{"short":"||",|",}
index_showicon.scrub {single()|"images":{"original":"||"|"}
index_rating.scrub {single|"ratingCode":"||",|",}
index_productiondate.scrub {single|"releaseYear":||,"|,"}
index_videoquality.scrub {single|"quality":"||",|",}
index_director.scrub {single|{"Director":[{"person":{"firstName":"||","__typename":"Person"|]}
index_director.modify {replace|","lastName":"| }
index_actor.scrub {multi|"Cast":[|"person":{"firstName":"|","__typename":"Person"}|],"__typename":"AllCastAndCrew"}}
index_actor.modify {replace|","lastName":"| }
index_temp_1.scrub {multi|"Cast":[|"role":{"firstName":"|","__typename":"Person"}|],"__typename":"AllCastAndCrew"}}
index_temp_1.modify {replace|","lastName":"| }
index_temp_2.modify {set|0} 
loop{(each "index_temp_3" in 'index_actor')|end} 
index_temp_4.modify {substring(type=element)|'index_temp_1' 'index_temp_2' 1} 
index_temp_4.modify {addstart(not "")|(role=} 
index_temp_4.modify {addend(~ "role=")|)} 
index_temp_5.modify {addend|'index_temp_3''index_temp_4'##} 
index_temp_2.modify {calculate(format=F0)|1 +} 
end_loop 
index_actor.modify {set|'index_temp_5'} 
index_actor.modify {replace|##|\|}
