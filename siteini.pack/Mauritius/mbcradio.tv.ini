site {url=mbcradio.tv|timezone=Indian/Mauritius|maxdays=7|cultureinfo=en-GB|charset=UTF-8|titlematchfactor=90|retry=<retry time-out="10" channel-delay="1">4</retry>}
*site {episodesystem=xmltv_ns}
urldate.format {datestring|yyyy-MM-dd}
url_index{url()|https://www.mbcradio.tv/sites/all/themes/mbcradiotv/tv-guide/|channel|.php?date=|urldate|}
url_index.headers {customheader=Accept-Encoding=gzip,deflate}
index_showsplit.scrub {multi|<TABLE|<TD COLSPAN="2">|<TD></TD></TR>|</TABLE>}
index_showsplit.modify {remove|</TD><TD COLSPAN="2">}
index_showsplit.modify {remove(type=regex)|\\}
index_showsplit.modify {cleanup(style=jsondecode)}
**index_showsplit.modify {(debug)}
index_start.scrub {regex||(\d{2}:\d{2}:\d{2})</TD>||}
index_title.scrub {single|onmouseout="UnTip()">||</a>|</a>} 
index_category.scrub{single|onmouseover="Tip('||<|<}*'
index_description.scrub {single|Synopsis:||<BR>|<BR>}
index_description.modify{cleanup}
index_productiondate.scrub {single|Year:||<BR>|<BR>}
index_producer.scrub {single(separator="," "/ P" include=first)|Producers:||<BR>|<BR>}
index_presenter.scrub {single(separator=",")|Presentation:||<BR>|<BR>}
index_director.scrub {single(separator=",")|Directors:||<BR>|<BR>}
index_writer.scrub {single(separator=",")|Writers:||<BR>|<BR>}
index_actor.scrub {single(separator=",")|Cast:||<BR>|<BR>}
