site {url=apuntmedia.es|timezone=Europe/London|maxdays=4|cultureinfo=en-GB|charset=UTF-8|titlematchfactor=90}

urldate.format {list|hui|dema|despus-dema|despus-dema-no-l-altre}
url_index{url()|https://www.apuntmedia.es/programacio/|channel|/|urldate|}
url_index.headers {customheader=Accept-Encoding=gzip,deflate}     * to speedup the downloading of the index pages
index_showsplit.scrub {multi|<article class="schedule-item||</article>|</main>}
**index_showsplit.modify {(debug)}
index_start.scrub {single|data-start-time="||"|"}
index_stop.scrub {single|data-end-time="||"|"}
index_title.scrub {single|<div class="schedule-item__title">||</div>|</div>} 
index_title.modify {cleanup(tags="<"">")} 
index_subtitle.scrub{single|<h2 class="schedule-item__episode-title">||</h2>|</h2>}
index_category.scrub{single|<span class="schedule-item__genre">||</span>|</span>}
index_category.modify{cleanup(style=name)}
index_description.scrub {single|<div class="schedule-item__resume">|<p class="schedule-item__resume-text">|</p>|</p>}
index_description.modify{cleanup}
index_urlchannellogo.modify {addstart|https://www.apuntmedia.es/apunt/images/default-apunt.svg}
index_showicon.scrub {single()|<picture>|src="|"|</picture>}
index_showicon.modify {remove(type=regex)|\s\d+w?\s?$}
index_rating.scrub{single| <span class="rating rating|title="Edat recomanada">|</span>|</span>}
index_rating.modify{replace|tp|TP}
