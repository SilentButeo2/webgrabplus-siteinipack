**------------------------------------------------------------------------------------------------
* @header_start
* WebGrab+Plus ini for grabbing EPG data from TvGuide websites
* @Site: canalsur.es
* @MinSWversion: V5.0
* @Revision 3 - [07/07/2026] WGMaker
* 	- re-enabled showdetails 
* @Revision 2 - [02/07/2026] Mat8861
* @Revision 1 - [06/03/2025] Blackbear199
*   - title fix
*   - add showicon
*   - add rating
*   - add category
* @Revision 0 - [21/01/2023] WGMaker
*   - creation
* @Remarks:
* @header_end
**------------------------------------------------------------------------------------------------
site {url=canalsur.es|timezone=Europe/Madrid|maxdays=3|cultureinfo=es-ES|charset=UTF-8|titlematchfactor=90|nopageoverlaps}
site {ratingsystem=ICAA|episodesystem=onscreen}
*
scope.range {(urlindex)|end}
url_index {url|https://www.canalsur.es/guia-programacion/|channel|/}
url_index.headers {customheader=Accept-Encoding=gzip,deflate,br}
end_scope
*
urldate.format {daycounter|0}
*
scope.range {(splitindex)|end}
index_showsplit.scrub {multi|<div class="ott-epg-grid" id="epgchannelLayer|<article|</article>|</main>}
**index_showsplit.modify {(debug)}
end_scope
*
scope.range {(indexshowdetails)|end}
index_start.scrub {single|<div class="startDate|">|</div>|</div>}
index_title.scrub {single|<span class="kicker-title">||</span>|</span>}
index_description.scrub {single|<p class="subtitle-atom|">|</p>|</div>}
index_description.modify {cleanup}
index_showicon.scrub {single|<img loading="lazy"|src="|"|</picture>}
index_category.scrub {single|<span class="genres|">|</span>|</span>}
index_rating.scrub{single|<span class="age-classification|">|</span>|</span>}
*
index_urlshow {url||<a href=|| target| target}
*index_urlshow.modify {(debug)}
index_urlshow.headers {customheader=Accept-Encoding=gzip,deflate,br}
end_scope
*
scope.range {(showdetails)|end}
subtitle.scrub {single|<meta property="og:title" content="||">|">}
subtitle.modify {clear('index_title')}
description.scrub {single|<meta name="description" content="||">|">}
productiondate.scrub {regex||Año producción:\s+(\d{4})||}
country.scrub {regex||País:\s+(\w+)\s||}
director.scrub {regex||Guión y dirección:\s+(\w+\s\w+(?:\s\w+))\s+||}
category.scrub {single|genre:||,|,}
rating.scrub {single|clasification:||,|,}
showicon.scrub {single|image:"||"|"}
*
title.modify {addstart|'index_title'}
*description.modify {set(debug "")|'temp_1'}
description.modify {cleanup()}
description.modify {cleanup(style=unidecode)}
description.modify {cleanup(style=jsondecode)}
description.modify {clear('index_description' ~ 'description')}
showicon.modify {cleanup(style=unidecode)}
end_scope
**  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _
**      #####  CHANNEL FILE CREATION (only to create the xxx-channel.xml file)
**
** @auto_xml_channel_start
*url_index {url|https://www.canalsur.es/parrilla.html}
*scope.range {(channellist)|end}
*index_site_id.scrub {regex||{"link":{"text":"[^"]*","title":"[^"]*","href":"https:\\/\\/www\.canalsur\.es\\/guia-programacion\\/(.*?)\\/","||}
*index_site_channel.scrub {regex||{"link":{"text":"([^"]*)","title":"[^"]*","href":"https:\\/\\/www\.canalsur\.es\\/guia-programacion\\/.*?\\/","||}
*index_site_channel.modify {cleanup(style=jsondecode)}
*index_site_id.modify {cleanup(removeduplicates link="index_site_channel")}
*end_scope
** @auto_xml_channel_end
