**------------------------------------------------------------------------------------------------
* @header_start
* WebGrab+Plus ini for grabbing EPG data from TvGuide websites
* @Site: guau.eus
* @MinSWversion: 5.5
* @Revision 0  - [12/05/2026] Mat8861
*   - creation
* @Remarks:
* @header_end         ~ 
**------------------------------------------------------------------------------------------------
site {url=guau.eus|timezone=Europe/Madrid|maxdays=7|cultureinfo=en-GB|charset=UTF-8|titlematchfactor=90|allowlastdayoverflow}
*
urldate.format {datestring|yyyyMMdd}
*
url_index.headers {method=POST}
url_index.headers {customheader=authority=guau.eus}
url_index.headers {referer=https://guau.eus/epg/gaztea}
url_index.headers {customheader=x-lang=es}
url_index.headers {contenttype=application/json}
url_index.headers {postdata={"slugs":["'channel'"],"iso_hours":["'urldate'11"]}}
url_index{url|https://guau.eus/api/v1/epg}
url_index.headers {customheader=Accept-Encoding=gzip,deflate}     * to speedup the downloading of the index pages
index_showsplit.scrub {multi|"items":[||]}]]|]}]]}
index_showsplit.modify {replace|\},\{|\}\|\{}
index_showsplit.modify {cleanup(style=jsondecode)}
**index_showsplit.modify {(debug)}
**********
index_start.scrub {single|"start_date":"||+|+}
index_stop.scrub {single|"end_date":"||+|+}
index_title.scrub {single|"title":"||",|",} 
index_subtitle.scrub{single|"subtitle":"||",|",|,}
index_description.scrub {single|"description":"||",|",}
index_description.modify{cleanup}

index_showicon.scrub {single|"thumbnail":"||",|",}
index_temp_2.scrub {regex||"media_id":(\d+),"||}
* NOTE: Enable urlshow will cause errors (many show id are blank)
*
*index_urlshow.modify {addstart('index_temp_2' not "")|https://guau.eus/api/v1/media/'index_temp_2'}
title.modify {addstart|'index_title'}
description.scrub {single|"description":"||",|",} 
presenter.scrub {multi|"type":"presenter","label":"||",|",}
category.scrub {single|"type":"category","label":"||",|",}
**  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _
**  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _
**      #####  CHANNEL FILE CREATION (only to create the xxx-channel.xml file)
**
** @auto_xml_channel_start  
*
*url_index{url()|https://guau.eus/api/v1/stations}
*url_index.headers {customheader=Accept-Encoding=gzip,deflate,br}
*index_site_channel.scrub {regex()||\{"id":\d+,"slug":"[^"]*","name":"([^"]*)","||}
*index_site_id.scrub {regex()||\{"id":\d+,"slug":"([^"]*)","name":"[^"]*","||}
*scope.range {(channellist)|end}
*index_site_id.modify {cleanup(removeduplicates=equal,100 link="index_site_channel")}
*end_scope
** @auto_xml_channel_end
