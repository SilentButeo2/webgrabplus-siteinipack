site {url=ccma.cat|timezone=Europe/Madrid|maxdays=7.1|cultureinfo=es-ES|charset=UTF-8|allowlastdayoverflow}
*
urldate.format {daycounter|0}
scope.range {(urlindex)|end}
url_index{url|https://www.3cat.cat/api/3cat/dades/?queryKey=%5B%22tira%22%2C%7B%22url%22%3A%22%2F%2Fapi.3cat.cat%2Fgraellatvfutur%3F_format%3Djson%26canal%3D|channel|%26data_emissio%3DAVUI|subpage|%26pagina%3D1%26sdom%3Dimg%26version%3D2.0%26cache%3D90%26master%3Dyes%22%7D%5D}
subpage.format {list||%252B1|%252B2|%252B3|%252B4|%252B5|%252B6|%252B7}
end_scope
index_showsplit.scrub {regex||\{"versio":.*?"rel_name":"IMAGE"\}\]\}||}
index_showsplit.modify {cleanup(style=jsondecode)}
*index_showsplit.modify {(debug)}
index_start.scrub {regex||\"data_emissio\":\"\d{2}\/\d{2}\/\d{4}\s(\d{2}:\d{2}:\d{2})",||}
index_title.scrub {single|"titol_tdt":"||",|",} 
index_subtitle.scrub {regex||"text_destacat":"([^"]*)"||} 
index_subtitle.scrub {single(include=last)|<div class="informacio-programa">|<p>|</p>|</div>} 
index_subtitle.modify{clear('index_title')}
index_description.scrub {single|"entradeta":"||",|",}
index_rating.scrub {single|"codis_etics":[|"desc":"|",|]}
index_showicon.scrub {regex||\{"text":"([^"]*)","mida":"[^"]*","alt":"[^"]*","titol":"[^"]*","rel_name":"IMAGE"\}\]\}||}
