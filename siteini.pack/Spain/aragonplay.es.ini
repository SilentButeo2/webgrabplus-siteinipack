site {url=aragonplay.es|timezone=Europe/Madrid|maxdays=2.1|cultureinfo=es-SP|charset=UTF-8|titlematchfactor=90|allowlastdayoverflow}
*site {episodesystem=xmltv_ns}
**
scope.range{(urlindex)|end}
url_index.headers {method=POST}
urldate.format {datestring|yyyy-MM-dd}
url_index.headers {contenttype=application/json; charset=utf-8}
url_index.headers {customheader=x-client-id=9974369404fb8cec096d1d6aaf25e7af18fdcac9724504175e}
url_index.headers {customheader=x-ott-language=es}
index_urlchannellogo.scrub  {regex(scope=datelogo)||"_id":"'index_variable_element'","logo":"([^"]*)","name":"[^"]*","||}
url_index.headers {postdata={"operationName":"getLivesEpg","variables":{"page":1,"hours":24,"ids":["'index_variable_element'"]},"query":"query getLivesEpg($page:Int=1,$hours:Int,$ids:[String]){getLives(ids:$ids){_id logo name schedules(hours:$hours,page:{limit:0,page:$page}){_id name date_start date_end description current isReplay match{matchDay __typename} show{_id title description __typename} live{_id name dvr type purchased __typename} __typename} __typename}}"}}
url_index{url|https://eu.next.mediastream.co/graphql}
url_index.headers {customheader=Accept-Encoding=gzip,deflate}     * to speedup the downloading of the index pages
index_variable_element.modify {set|'config_site_id'} 
end_scope
**
index_showsplit.scrub {regex||\{"_id":"'index_variable_element'",".*?"schedules":\[(.*?)"Schedule"}\],"__typename":"Live"}||}
index_showsplit.modify {substring(type=regex)|\{"_id":".*?"__typename":"Schedule"\}}
index_showsplit.modify {cleanup(style=jsondecode)}
**index_showsplit.modify {(debug)}
**********
index_start.scrub {single|"date_start":"||Z",|Z",}
index_stop.scrub {single|"date_end":"||Z",|Z",}
index_title.scrub {single|"name":"||"}
index_description.scrub {single|"description":"||","|","}
index_previousshown.scrub{regex||"isReplay":(true),||}
