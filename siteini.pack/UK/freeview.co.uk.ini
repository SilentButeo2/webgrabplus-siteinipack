﻿**------------------------------------------------------------------------------------------------
* @header_start
* WebGrab+Plus ini for grabbing EPG data from TvGuide websites
* @Site: freeview.co.uk
* @MinSWversion: V5.1.5
* @Revision 3 - [16/05/2026] Mat8861 
* @Revision 2 - [26/05/2021] Mat8861 
* @Revision 1 - [01/11/2018] Mat8861 
* @Revision 0 - [31/12/2017] Blackbear199
*  - creation
* @Remarks:  	to get channel enter a postal code in site_id
*			     example  :   <channel update="i" site="freeview.co.uk" site_id="WC2N 5DU" xmltv_id="dummy">dummy</channel>
*
* @header_end
**------------------------------------------------------------------------------------------------
site {url=freeview.co.uk|timezone=UTC|maxdays=7|cultureinfo=en-GB|charset=UTF-8|titlematchfactor=90|keepindexpage}
*
scope.range{(urlindex)|end}
global_temp_2.modify{substring(type=regex)|'config_site_id' "^(\d+)##"}*area
global_temp_3.modify {substring(type=regex)|'config_site_id' ".*?##(.*?)$"} *channel
global_temp_4.modify {calculate(format=date,yyyy-MM-dd)|'urldate'}
global_temp_5.modify {calculate(format=date,unix)|'global_temp_4'}
url_index.modify {replace|##region##|'global_temp_2'}
url_index.modify {replace|##date##|'global_temp_5'}
url_index{url()|https://www.freeview.co.uk/api/tv-guide?nid=##region##&start=##date##}
url_index.headers {customheader=Authorization=Basic ZnJlZXZpZXc6ZnIzM3YxM3c=}
url_index.headers {customheader=Accept-Encoding=gzip,deflate}
urldate.format {datestring|yyyy-MM-dd}
end_scope
*
*index_urlchannellogo.scrub {regex||^.+?\{"id":'global_temp_2',"name":"[^"]+","number":\d+,"logo":"([^"]+)",||}
*index_urlchannellogo.modify {addstart(not "")|https://www.freeview.co.uk}
*
scope.range{(splitindex)|end}
index_showsplit.scrub {regex()||\{"service_id":"'global_temp_3'","title":".*?","events":\[.*?\]\}||}
index_showsplit.modify{substring(type=regex)|\{"program_id":".*?"uuid":".*?\}}
index_showsplit.modify {cleanup(style=jsondecode)}
*index_showsplit.modify {(debug)}
end_scope
*
scope.range{(indexshowdetails)|end}
index_start.scrub {single|"start_time":"||+|+}
index_duration.scrub {single|"duration":||,|,}
index_title.scrub {single|"main_title":"||",|",}
index_subtitle.scrub {single(separator=": " exclude="Episode")|"secondary_title":"||",|",}

index_category.scrub {single|"category":"||",|",}
index_productiondate.scrub {regex||"year":(\d{4}),||}

*index_temp_1.modify {substring(type=regex)|'index_subtitle' "(Series\s\d+\:\sEpisode\s\d+)"}
*index_temp_5.modify {substring(debug type=regex)|'index_subtitle' "(Series\s\d+\|\s\d+)\.?"}
*index_episode.modify {addstart(debug pattern="Series 'S1' Episode 'E1'""Series 'S1''E1'""Episode 'E1'""Series 'S1'")|'index_temp_1''index_temp_5'}
*index_episode.modify {addend|'index_temp_5'}
index_showicon.scrub {single|"image":"||",|",}
index_temp_2.scrub{single|"duration":"||",|",}
index_temp_3.scrub{single|"start_time":"||",|",}
index_temp_3.modify{cleanup(style=urlencode)}
index_temp_4.scrub{single|"program_id":"||",|",}
*
index_actor.modify {replace|), |)\|}
index_actor.modify {remove|With }
index_actor.modify {remove(type=regex)|\s*\([^\)]+$}
index_actor.modify {replace| (|(role=}
index_episode.modify {addstart('index_temp_1' not "")|'index_temp_1' }
index_urlshow.modify {addstart()|https://www.freeview.co.uk/api/program?sid='global_temp_3'&nid='global_temp_2'&pid='index_temp_4'&start_time='index_temp_3'&duration='index_temp_2'}
end_scope
title.scrub {single()|"main_title":"||",|",}
title.modify {cleanup(style=jsondecode)}
*titleoriginal.scrub {single|}
*subtitle.scrub {single|}

loop{('description' "" max=1)|1}
description.scrub {single|"synopsis":{|"long":"|"|}}
temp_1.scrub {single|"synopsis":{|"medium":"|"|}}
description.modify {addstart('temp_1' not "")|'temp_1'}
end_loop
description.modify {cleanup(style=jsondecode)}
*director.scrub {single|}
actor.scrub {multi(max=8)|{"role":"ACTOR","given_name":"||"}|"}}
actor.modify {replace|","family_name":"| }
actor.modify {cleanup(style=jsondecode)}
*presenter.scrub {single|}
*producer.scrub {single|}
*writer.scrub {single|}
*composer.scrub {single|}
*rating.scrub {multi|}
*ratingicon.scrub {multi|}
*category.scrub {single|}
*productiondate.scrub {single|}
*starrating.scrub {single|}
*episode.scrub {single|}
*subtitles.scrub {single|}
*premiere.scrub {single|}
*previousshown.scrub {single|}
*temp_9.scrub{multi(debug)||||}
*
*
