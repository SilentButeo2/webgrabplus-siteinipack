*scope.range{(urlindex)|end}
*url_index.headers {method=POST_BACK(GET,GET)}
*url_index {url()|https://www.freeview.co.uk/api/get-network-id?postcode=|channel|}
*url_index.headers {customheader=Accept-Encoding=gzip,deflate}
*url_index.headers {accept=application/json, text/plain, */*}
*url_index.headers {authority=www.freeview.co.uk}
*global_temp_1.scrub {regex(debug)||\{"status":"success","data":\{"network_id":([^"]*),"network_name":"[^"]*"\}\}||}
*end_scope
*scope.range{(postback)|end}
*url_index.modify {set()|https://www.freeview.co.uk/api/channel-list?nid='global_temp_1'}
*url_index.headers {customheader=Accept-Encoding=gzip,deflate}
*url_index.headers {customheader=Sec-Fetch-Site=cross-site}
*url_index.headers {customheader=Sec-Fetch-Mode=cors}
*url_index.headers {customheader=Sec-Fetch-Dest=empty}
*end_scope
*index_site_channel.scrub {regex()||"service_id":"\d+","title":"([^"]*)","||}
*index_site_channel.modify{cleanup(style=unidecode)}
*index_site_id.scrub {regex()||"service_id":"(\d+)","title":"[^"]*","||}
*index_site_id.modify{addstart|'global_temp_1'##}
*index_site_id.modify {cleanup(removeduplicates=equal,100 link="index_site_channel")}
** @auto_xml_channel_end
