**------------------------------------------------------------------------------------------------
* @header_start
* WebGrab+Plus ini for grabbing EPG data from TvGuide websites
* @Site: guida.tv
* @MinSWversion: V5.0
* @Revision 1 - [08/03/2026] LicNotRequired
*   - site changes
* @Revision 0 - [20/04/2024] Blackbear199
*  - creation
* @Remarks:
* Step 1: Create Provider File
* <channel update="i" site="guida.tv" site_id="" xmltv_id="dummy">dummy</channel>
* <update>c1-provider</update>
* Step 2: Create Channel List
* Use a channel line created from step 1.
* <channel update="i" site="guida.tv" site_id="-3" xmltv_id="Tutti i canali">Tutti i canali</channel>
* <update>c2-tutti</update>
* @header_end
**------------------------------------------------------------------------------------------------
site {url=guida.tv|timezone=Europe/Rome|maxdays=7|cultureinfo=it-IT|charset=UTF-8|titlematchfactor=90|allowlastdayoverflow|firstshow=1}
site {ratingsystem=User|episodesystem=onscreen}
*
scope.range {(urlindex)|end}
url_index {url|https://www.guida.tv/programmi-tv/palinsesto/canale/|channel|.html?dt=|urldate|}
url_index.headers {customheader=origin=https://www.guida.tv}
url_index.headers {customheader=Accept-Encoding=gzip,deflate,br}
*
urldate.format {datestring|yyyy-MM-dd|en-GB}
end_scope
*
index_urlchannellogo {url(scope=datelogo)||<div class="col col-12 col-lg-8">|src="|"|</div>}
*
scope.range {(splitindex)|end}
index_showsplit.scrub {multi|<tbody>|<tr>|</tr>|</tbody>}
index_temp_9.modify {substring(type=regex)|'index_showsplit' "^.*?<h5 class=\"thin\">([^<]*)"}
index_temp_9.modify {cleanup(removeduplicates span=1 link="index_showsplit")}
*index_showsplit.modify {(debug)}
end_scope
*
scope.range {(indexshowdetails)|end}
index_start.scrub {single|<h5 class="thin">||</h5>|</h5>}
index_title.scrub {single|<a href|>|</a>|</a>}
index_subtitle.scrub {single(separator="-" include=first exclude="Episodio")|<h6>||<|<}
index_episode.scrub {single(pattern="Stagione 'S1' Episodio 'E1'""Stagione 'S1'""Episodio 'E1'")|<h6>|<i>|</i>|</h6>}
index_category.scrub {regex||alt="(?:TV\s(Movie\|Sport))">||}
index_premiere.scrub {regex||alt="(New)">||}
index_temp_1.scrub {multi|<td width="110">|<i>|</i>|</td>}
index_temp_2.scrub {regex||#(airing-\d+)||}
index_temp_3.scrub {single|<a href="||"|"}
*
index_title.modify {cleanup(tags="<"">")}
index_title.modify {cleanup}
index_title.modify {remove(type=regex)|"\s*\(\d{4}\)\s*"}
index_subtitle.modify {set("")|'index_temp_1'}
index_episode.modify {cleanup}
index_premiere.modify {set(not "")|true}
index_previousshown.modify {set('index_premiere' "")|true}
index_variable_element.modify {set|'index_temp_2'}
*
index_urlshow.modify {addstart|'index_temp_3'}
index_urlshow.headers {referer=https://www.ontvtonight.com/}
index_urlshow.headers {customheader=origin=https://www.guida.tv}
index_urlshow.headers {customheader=Accept-Encoding=gzip,deflate,br}
end_scope
*
scope.range {(showdetails)|end}
director.scrub {multi(includeblock="Regista")|<div class="single-cast-head">|<strong>|</strong>|</div>}
actor.scrub {multi(include=".. ")|<div class="single-cast-head">||</div>|</div>}
presenter.scrub {multi(includeblock="Conduttore")|<div class="single-cast-head">|<strong>|</strong>|</div>}
producer.scrub {multi(includeblock="Produttore")|<div class="single-cast-head">|<strong>|</strong>|</div>}
composer.scrub {multi(includeblock="Musica")|<div class="single-cast-head">|<strong>|</strong>|</div>}
showicon.scrub {single|<aside class="right-sidebar">|src="|"|</aside>}
temp_1.scrub {multi('index_variable_element' not "" includeblock="'index_variable_element'")|<li class="show-airing|<a class="show-episode-title" href="|"|</li>}
temp_2.scrub {multi('index_variable_element' not "" includeblock="'index_variable_element'")|<li class="show-airing|<span class="show-se">|</span>|</li>}
*
title.modify {addstart|'index_title'}
temp_2.modify {cleanup}
temp_2.modify {remove(type=regex)|"(?:tagione\|pisodio)\s*"}
temp_3.modify {substring(type=regex)|'index_episode' "^(S\d+\s*E\d+\|S\d+\|E\d+)\(system=[^\)]*\)$"}
temp_1.modify {set("")|'index_temp_3'}
loop {('index_episode' not "")|end}
temp_1.modify {clear('temp_2' not 'temp_3')}
end_loop
director.modify {cleanup}
presenter.modify {cleanup}
producer.modify {cleanup}
composer.modify {cleanup}
loop {(each "temp_9" in 'actor')|end}
temp_8.modify {substring(type=regex)|'temp_9' "<strong>(.*?)<\/strong>"}
temp_7.modify {substring(type=regex)|'temp_9' "\.\.\s([^<]*)"}
temp_8.modify {addend(['temp_8' not ""] ['temp_7' not ""] &)|(role='temp_7')}
temp_6.modify {addend('temp_8' not "")|'temp_8'####}
end_loop
actor.modify {substring('temp_6' not "" type=regex)|'temp_6' "(.*?)####"}
actor.modify {cleanup}
*
urlsubdetail.modify {addstart|'temp_1'}
urlsubdetail.headers {customheader=origin=https://www.guida.tv}
urlsubdetail.headers {customheader=Accept-Encoding=gzip,deflate,br}
*
showicon.modify {remove('urlsubdetail' not "")|'showicon')}
end_scope
*
scope.range {(showsubdetails)|end}
subdetail_description.scrub {single|<div class="tvbody">|<p>|</p>|</div>}
subdetail_category.scrub {multi|<div class="schedule-attributes-genres">|<span>|</span>|</div>}
subdetail_starrating.scrub {regex||<span class="rating-avg">([1-9]\.\d+)</span>||}
subdetail_productiondate.scrub {multi|<div class="schedule-attributes">|<span>|</span>|</div>}
subdetail_showicon.scrub {single|<img class="program-media-image"|src="|"|>}
*
subdetail_description.modify {remove(type=regex)|"^(?:Premiere\|Repeat)$"}
subdetail_starrating.modify {calculate(not "" format=F1)}
subdetail_starrating.modify {addend(not "")|(system=User)}
end_scope
**  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _
**      #####  PROVIDER FILE CREATION (only to create the xxx-channel.xml file)
**
** @auto_xml_channel_start
*scope.range {(urlindex)|end}
*url_index {url|https://www.guida.tv/getproviders}
*url_index.headers {method=POST}
*url_index.headers {postdata=region=Italy}
*end_scope
*scope.range {(channellist)|end}
*index_site_id.scrub {regex||"(-?\w+)":\{"id":\d+,"title":||}
*index_site_channel.scrub {regex||\{"id":\d+,"title":"(.*?)",||}
*index_site_channel.modify {cleanup(style=jsondecode)}
*index_site_id.modify {cleanup(removeduplicates link="index_site_channel")}
*end_scope
** @auto_xml_channel_end

**  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _  _
**      #####  CHANNEL FILE CREATION (only to create the xxx-channel.xml file)
**
** @auto_xml_channel_start
*scope.range {(urlindex)|end}
*url_index {url|https://www.guida.tv/guide/schedule?provider=|channel|&region=Italy&TVperiod=Afternoon&date=|urldate|&st=0}
*url_index.headers {method=POST}
*url_index.headers {postdata=action=1&menu=0&hour=5&minute=46&userdate='global_temp_9'}
*global_temp_9.modify {calculate(format=date,ddd+MMM+dd+yyyy)|'urldate'}
*end_scope
*scope.range {(channellist)|end}
*index_site_id.scrub {multi|<span class=\"channelname\">|<a href=\"https:\/\/www.guida.tv\/programmi-tv\/palinsesto\/canale\/|.html\"|.html\"}
*index_site_channel.scrub {multi(exclude="img title")|<span class=\"channelname\">|target=\"_blank\"|<\/a>|<\/span>}
*index_site_id.modify {cleanup(style=jsondecode)}
*index_site_channel.modify {cleanup(style=jsondecode)}
*index_site_channel.modify {remove(type=regex)|"^[^>]*>"}
*index_site_id.modify {cleanup(removeduplicates link="index_site_channel")}
*end_scope
** @auto_xml_channel_end
