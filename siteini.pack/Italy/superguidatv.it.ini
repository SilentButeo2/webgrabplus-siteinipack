**------------------------------------------------------------------------------------------------
site {url=superguidatv.it|timezone=Europe/Rome|maxdays=3|cultureinfo=it-IT|charset=UTF-8|titlematchfactor=90|allowlastdayoverflow}
*
url_index{url|https://www.superguidatv.it/programmazione-canale/|urldate|/guida-programmi-|channel|}
url_index.headers {customheader=Accept-Encoding=gzip,deflate,br}
url_index.headers {accept=text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3}
urldate.format {list|oggi|domani|dopodomani}
*
index_urlchannellogo {url||<img class="sgtvchannelplan_|src="|" alt="|">}
index_date.scrub {single(force separator=", " include=last)|<a id="sgtvDateA"|spanDateSelector">|</span>|</a>}
*
index_showsplit.scrub {multi(exclude="<li q:key=")|<ul class="sgtv-flex sgtv-w-full|<li style|<!--/qv--></li>|<!--/qv--></ul><!--/qv--></div><!--/qv-->}
*index_showsplit.modify{(debug)}
*
index_start.scrub {single|<p class="sgtv-w-20|">|</p>|</p>}
index_title.scrub {single|<p class="sgtv-truncate sgtv-text-lg|>|</p>|</p>} 
index_episode.modify {substring(type=regex pattern="St.'S1'-Ep.'E1'""Ep.'E1'""St.'S1'")|'index_title' "\s\(((?:St.\s\d+\s-\s)?Ep.\s\d+)\)"}
index_title.modify {remove(type=regex)|(\s\(((?:St.\s\d+\s-\s)?Ep.\s\d+)\))$}
index_category.scrub {single|<p class="sgtv-truncate sgtv-border-l-|>|</p>|</div>}
index_category.modify {remove(type=regex)|\(\d+\'\)}
index_productiondate.modify{substring(type=regex)|'index_title' "\s\((\d{4})\)"}
index_title.modify {remove(type=regex)|\s\(\d{4}\)$}
*
index_urlshow {url|https://www.superguidatv.it|<a href="||"|"}
index_urlshow.headers {customheader=Accept-Encoding=gzip,deflate,br}
index_urlshow.headers {accept=text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3}
*
title.modify {addstart|'index_title'}
description.scrub {single|<h2 class="sgtv-font-roboto sgtv-text-2xl-half sgtv-leading-10">Trama Episodio|<p class="sgtv-break-words sgtv-text-justify sgtv-font-verdana sgtv-text-base sgtv-leading-7">|</p>|</p>}
temp_1.scrub {single|<p class="sgtv-break-words|">|</p>|</div>}
description.modify{addend('description' "")|'temp_1'}
description.modify {cleanup}
director.scrub {single|"director":{|"name":"|"|}}
actor.scrub {multi(max=6)|"actor":[|"name":"|"|]}
actor.scrub {multi(max=6)|<p class="sgtv-whitespace-normal sgtv-font-verdana sgtv-text-sm sgtv-leading-6">|<strong class="sgtv-break-words">|</strong>|</p>}
rating.scrub{single|"aggregateRating":{|"ratingValue":|,"|}}
category.scrub {single(separator=",")|\"genre\":\"||\",\"|\",\"}
showicon.scrub {regex||<div class=\"sgtv-aspect-video\">.+?<img src="([^"]*)"||}
country.scrub {regex||<div class=\"sgtv-flex sgtv-h-1\/5 sgtv-items-center\"><p class=\"sgtv-truncate\">(.*?)\s\d{4}<\/p><\/div>||}
index_subtitle.modify{remove(~ 'index_title')|'index_subtitle'}
