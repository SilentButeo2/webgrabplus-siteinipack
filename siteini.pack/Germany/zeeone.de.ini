site {url=zeeone.de|timezone=Europe/Berlin|maxdays=2|cultureinfo=de-DE|charset=UTF-8|nopageoverlaps|titlematchfactor=90}
site {ratingsystem=DE|episodesystem=onscreen}
url_index.headers {customheader=Accept-Encoding=gzip,deflate}
url_index{url|https://gwapi.zee5.com/v1/epg?channels=0-9-161&start=0&end=1&translation=en&country=DE&time_offset=%2B02%3A00}
index_showsplit.scrub {regex()||\{"image":.*?"value":"[^"]*"\}\]\}||}
index_temp_1.modify {substring(type=regex)|'index_showsplit' "start_time\":\".*?\""}
index_temp_1.modify {cleanup(removeduplicates link="index_showsplit")}
*index_showsplit.modify {(debug)}
index_urlshow {url|http://zeeone.de|<a href="||" class} 
index_urlchannellogo.modify {addstart|https://zeeonelive.blob.core.windows.net/cmsstorage/zeeone/media/images/logo/zeeone_logo_rgb_indianrose54_69.png}
index_start.scrub {single|"start_time":"||Z|Z}
index_stop.scrub {single|"end_time":"||Z|Z}
index_title.scrub {single|"title":"||",|,"}
index_titleoriginal.scrub {single|"original_title":"||",|,"}
index_titleoriginal.modify {clear ('index_title')}
index_subtitle.scrub {single|<span class="heading">|<span>|</span>|</p>}
index_description.scrub {single|"description":"||",|,"}
index_temp_2.scrub {single|"id":"||",|",}
index_temp_3.scrub {single|"cover":"","list":"||",|",}
index_showicon.modify{addstart|https://akamaividz2.zee5.com/image/upload/w_677,h_381,c_scale,f_webp,q_auto:eco/resources/'index_temp_2'/list/'index_temp_3'}
productiondate.scrub {single(include=last)|<div class="topHeader">|<h3>|</h3>}
director.scrub {single|<div class="columnthree">|<p>|</p>|</div>}
actor.scrub {regex||<span class="pull-right">(.*?)</span>||}
