* in webgrab++.config.xml add
* if flaresolverr is not running on same pc as webgrab continue below
* <credentials user="127.0.0.1:8191" password="">kan.org.il</credentials>
* replace user="ip:port" with flaresolver ip:port
* default user="127.0.0.1:8191"
* set the timezone= on the site {xxx} line to the timezone of the pc running webgrab.
*           default language is arabic
*           to select english, add en## to the beginning of channel site_id="xx" value.
*           example
*           <channel update="i" site="rotana.net" site_id="en##431" xmltv_id="Rotana Cinema KSA">Rotana Cinema KSA</channel>
* @header_end
