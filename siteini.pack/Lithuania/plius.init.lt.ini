site {url=plius.init.lt|timezone=UTC|maxdays=7.1|cultureinfo=lt-LT|charset=UTF-8|titlematchfactor=90}
*
scope.range{(urlindex)|end}
urldate.format {datenumber|UNIX|0} 
url_index{url|https://api-ott.init.lt/public/epggrid/channels/##ch##/from/##start##/to/##end##/lang/lt}
global_temp_1.modify {calculate(format=date,yyyy-MM-dd)|'urldate'} 
global_temp_2.modify {calculate(format=date,unix)|'global_temp_1'}
global_temp_3.modify {calculate(format=date,yyyy-MM-dd)|'urldate' 07:00:00 +} 
global_temp_4.modify {calculate(format=date,unix)|'global_temp_3'}
global_temp_5.modify {substring(type=regex)|'config_site_id' "^(\d+)##"}
global_temp_6.modify {substring(type=regex)|'config_site_id' "^\d+##(.*?)$"}
url_index.modify {replace|##start##|'global_temp_2'}
url_index.modify {replace|##end##|'global_temp_4'}
url_index.modify {replace|##ch##|'global_temp_5'}
end_scope
index_urlchannellogo.modify{addstart|https://plius.init.lt/static/channels/'global_temp_6'}
*
index_showsplit.scrub {multi|"epg":[||}]}|}]}}
index_showsplit.modify {replace|\}\},\{|\}\}\|\{}
index_showsplit.modify {cleanup(style=unidecode)}
index_showsplit.modify {cleanup(style=jsondecode)}
*index_showsplit.modify {(debug)}
**********
index_start.scrub {regex||"start":(\d+),"stop":\d+,||}
index_stop.scrub {regex||"start":\d+,"stop":(\d+),||}
index_title.scrub {single|"title":"||","|","} 
index_description.scrub {single|"description":"||","|","} 
index_rating.scrub {regex||"age_rating":([1-9]\d+),"||}
index_director.scrub {multi(max=3)|directors":[|"name":"|"|]}
index_actor.scrub{multi(max=8)|"actors":[|"name":"|"|]}
index_writer.scrub {multi(max=3)|"writers":[|"name":"|"|]}
index_category.scrub {multi(separator="","" "," max=2)|"tva_contents":["||"]|"]}
index_starrating.scrub {single(system="imdb")|"imdb":{"votes":|,"rating":|}|}}
index_starrating.modify {addend(not "")|(system=Imdb)}
index_showicon.scrub {single|"posters":["||"|]}
index_temp_2.scrub {regex||"episode_no":([1-9]\d+)||}
index_temp_2.modify {addstart('index_temp_2' not "")|E}
index_episode.scrub {regex(pattern="S'S1' E'E1'""S'S1'""E'E1'")||"season_no":([1-9]\d+),"||}
index_episode.modify {addstart(not "")|S}
index_episode.modify {addend|'index_temp_2'}
