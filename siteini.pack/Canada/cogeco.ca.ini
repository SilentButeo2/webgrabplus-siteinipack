site {url=cogeco.ca|timezone=America/Toronto|maxdays=8|cultureinfo=en-US|charset=UTF-8|titlematchfactor=90|keepindexpage|ratingsystem=CA}
*
urldate.format {datestring|yyyy-MM-dd}
*
scope.range {(urlindex)|end}
global_temp_3.modify {substring(type=regex)|'config_site_id' "^(.+?)\/"}
global_temp_4.modify {substring(type=regex)|'config_site_id' "\/(.+?)\/"}
global_temp_5.modify {substring(type=regex)|'config_site_id' "^.*?\/.*?\/(.+?)$"}
url_index {url|https://tvmds.tvpassport.com/tvmds/cogeco/grid_v3/grid.php?subid=tvpassport&lu=#id#&st=|subpage|&items=99999}
url_index.modify {replace|#id#|'global_temp_4'}
global_temp_1.modify {calculate(format=date,unix)|'urldate'}
subpage.format {list(format=F0 step=10800 count=8)|'global_temp_1'}
end_scope
*
scope.range {(splitindex)|end}
index_showsplit.scrub {regex()||"tvm_chan_'global_temp_5'\\".*?<!-- channel row||}
loop {(each "index_temp_9" in 'index_showsplit')|end}
index_temp_8.modify {substring(type=regex)|'index_temp_9' "<div\sid=\'\d+\'[^:]*:(?!1%)\d+.*?div>"}
index_temp_7.modify {replace|\||#_#}
index_temp_7.modify {addend|'index_temp_8'#_#}
end_loop
index_showsplit.modify {substring(type=regex)|'index_temp_7' "(.*?)#_#"}
index_showsplit.modify {cleanup(style=jsondecode)}
index_temp_3.modify {substring(type=regex)|'index_showsplit' "id=\'\d+\'"}
index_temp_3.modify {cleanup(removeduplicates span=1 link="index_showsplit")}
end_scope
*
scope.range {(datelogo)|end}
index_urlchannellogo.scrub {regex||<div id=\\"tvm_chan_'global_temp_5'\\".*?<img src=\\"([^"]*)\\"||}
index_urlchannellogo.modify {addstart(not "")|https://cdn.tvpassport.com/image/station/1216x448/}
index_urlchannellogo.modify {substring(type=element)|0 1}
end_scope
*
scope.range {(indexshowdetails)|end}
index_title.scrub {single|<p class='tvm_showname'>||</p></div>|</p></div>}
index_temp_1.scrub {single|id='||'|'}
index_urlshow.modify {addstart|https://tvmds.tvpassport.com/tvmds/cogeco/grid_v3/program_details/program_details.php?subid=tvpassport&ltid='index_temp_1'&stid='global_temp_3'&luid='global_temp_4'}
index_urlshow.headers {customheader=Accept-Encoding=gzip,deflate,br}
end_scope
*
scope.range {(showdetails)|end}
title.modify {addstart|'index_title'}
start.scrub {single(pattern="h:mm tt")|Start Time:    </span>|">|</span>|</span>}
subtitle.scrub {single|<p class="details_tvm_txt_showname bold">||</p>|</p>}
if {('title' ~ "Movie")|end}
title.modify {set|'subtitle'}
end_if
if {('title' ~ "Cinéma")|end}
title.modify {set|'subtitle'}
end_if
subtitle.modify {clear(== 'title')}
description.scrub {single|<p class="details_tvm_td_detailsbot">||</p>|</p>}
description.modify {cleanup(tags="<"">")}
actor.scrub {single(separator=", ")|<br /><p>Starring ||.</p>|.</p>}
director.scrub {regex(separator=", ")||Directed\sby\s(.+?)\.</p>||}
category.scrub {regex||<br \/><p>.*?<\/p>([^,]*),||}
productiondate.scrub {regex||<br \/><p>.*?<\/p>[^\d]*(\d{4})||}
showicon.scrub {single|<img id='show_graphic' src="||"|"}
showicon.modify {addstart(not "")|https:}
showicon.modify {replace|240x135|1920x1080}
rating.scrub {regex||Rating:[^"]*[^>]*>([^<]*)<\/span>||}
end_scope
*
