site {url=programme-television.org|timezone=Europe/Paris|maxdays=14.1|cultureinfo=fr-FR|charset=UTF-8|titlematchfactor=90|allowlastdayoverflow}
site {ratingsystem=FR|episodesystem=onscreen}
*
scope.range {(urlindex)|end}
url_index {url|https://www.programme-television.org/tv/chaines/##channel##}
url_index.headers {method=POST_BACK(GET,GET)}
url_index.headers {host=www.programme-television.org}
url_index.headers {customheader=Accept-Encoding=gzip,deflate,br}
*
global_temp_9.modify {calculate(format=F0)|'config_timespan_days' 1 +}
global_temp_9.modify {set(> "14")|14}
*
global_temp_8.scrub {multi(exclude=first)|<div class="list-dates">|data-href="/tv/chaines/|"|</div>}
*
global_temp_1.modify {substring(type=regex)|'config_site_id' "^[^#]*"}
global_temp_2.modify {substring(type=regex)|'config_site_id' "[^#]*$"}
*
url_index.modify {replace|##channel##|'global_temp_1'}
*
urldate.format {datestring|yyyy-MM-dd}
end_scope
*
scope.range {(postback)|end}
global_temp_8.modify {substring(type=element)|0 'global_temp_9'}
subpage.format {list|'global_temp_8'}
url_index.modify {set|https://www.programme-television.org/tv/chaines/'subpage'}
end_scope
*
scope.range {(datelogo)|end}
index_urlchannellogo.modify {set|https://tv7j.cdnartwhere.eu/images/logos_chaines_sd/'global_temp_2'.png}
end_scope
*
scope.range {(splitindex)|end}
index_showsplit.scrub {multi|<li class="tvgrid-broadcast__item">||</li>|</li>}
index_showsplit.modify {replace(type=regex)|"\!\?\?\!"|-}
index_temp_9.modify {substring(type=regex)|'index_showsplit' "<div class=\"tvgrid-broadcast__details-time\">([^<]*)"} 
index_temp_9.modify {cleanup(removeduplicates span=1 link="index_showsplit")}
*index_showsplit.modify{(debug)}
end_scope
*
scope.range {(indexshowdetails)|end}
index_start.scrub {single|<div class="tvgrid-broadcast__details-time">||</div>|</div>}
index_duration.scrub {single(separator="min""-" include=first)|<div class="tvgrid-broadcast__subdetails">||</div>|</div>}
index_title.scrub {single|<div class="tvgrid-broadcast__details-title">|<span>|</span>|</div>} 
index_subtitle.scrub {single|<div class="tvgrid-broadcast__details-season">||</div>|</div>}
index_category.scrub {single(separator="min""-" include=last)|<div class="tvgrid-broadcast__subdetails">||</div>|</div>}
index_starrating.scrub {single|<div class="tvgrid-broadcast__details-label">||</div>|</div>}
index_showicon.scrub {single|<div class="tvgrid-broadcast__poster">|src="|"|</div>}
*
index_episode.modify {substring(pattern="S'S1' E'E1'""S'S1'""E'E1'" type=regex)|'index_subtitle' "^(S\d+\sE\d+\|S\d+\|E\d+)(?:\s*-\s*\|$)"}
index_subtitle.modify {remove('index_episode' not "" type=regex)|"^'index_episode'(?:\s*-\s*)?"}
*
index_starrating.modify {replace|Pas mal|1/3}
index_starrating.modify {replace|Bien|2/3}
index_starrating.modify {replace|Très bien|3/3}
*
index_showicon.modify {addstart(not "")|https:}
*
index_urlshow {url|https://www.programme-television.org| href="||"|"}
index_urlshow.headers {host=www.programme-television.org}
index_urlshow.headers {customheader=Accept-Encoding=gzip,deflate,br}
*
index_variable_element.modify {substring(type=regex)|'index_urlshow' "#(\d+)$"}
end_scope
*
scope.range {(showdetails)|end}
description.scrub {single|<p class="program-details__summary-text">||</p>|</p>}
director.scrub {multi(includeblock="Réalisateur")|<li class="casting__item">|<p class="casting__name">|</p>|</li>}
actor.scrub {multi(excludeblock="Réalisateur""Producteur""Présentateur""Créateur""Scénariste""Scénario""Musique")|<li class="casting__item">||</li>|</li>}
producer.scrub {multi(includeblock="Producteur")|<li class="casting__item">|<p class="casting__name">|</p>|</li>}
presenter.scrub {multi(includeblock="Présentateur")|<li class="casting__item">|<p class="casting__name">|</p>|</li>}
writer.scrub {multi(includeblock="Scénariste")|<li class="casting__item">|<p class="casting__name">|</p>|</li>}
composer.scrub {multi(includeblock="Musique")|<li class="casting__item">|<p class="casting__name">|</p>|</li>}
country.scrub {single|Production</h2>|">|</span>|</li>}
productiondate.scrub {single|Production</h2>|">|</span>|</li>}
temp_1.scrub {multi(includeblock=1)|<ul class="broadcast-attribute">|<li class="broadcast-attribute__item">|</li>|</ul>}
temp_2.scrub {regex('index_variable_element' not "")||data-episode-id="'index_variable_element'" data-video="[^"]*">(?:.*?)(?:<div class="episode__summary">(.*?)</div>)(?:.*?)</div>[^<]*</div>||}
*
title.modify {addstart|'index_title'}
temp_1.modify {cleanup(tags="<"">")}
description.modify {set('temp_2' not "")|'temp_2'}
description.modify {addend('temp_1' ~ "Inédit")|(Inédit)}
description.modify {addend('temp_1' ~ "Audio description")|(Audio description)}
temp_6.modify {clear}
loop {(each "temp_9" in 'actor')|end}
temp_8.modify {substring(type=regex)|'temp_9' "<p class=\"casting__name\">(.*?)<\/p>"}
temp_7.modify {substring(type=regex)|'temp_9' "<span class=\"casting__role\">(.*?)<\/span>"}
temp_8.modify {addend('temp_7' not "")|(role='temp_7')}
temp_6.modify {addend('temp_8' not "")|'temp_8'####}
end_loop
actor.modify {substring(type=regex)|'temp_6' "(.*?)####"}
country.modify {remove('productiondate' not "")| - 'productiondate'}
country.modify {replace| - |\|}
videoquality.modify {set('temp_1' ~ "Haute définition")|HD}
videoaspect.modify {set('temp_1' ~ "16/9")|16:9}
subtitles.modify {set('temp_1' ~ "Sous-titrage télétexte")|true}
end_scope
